name: C/Fortran Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Prevents cancelling other OS jobs if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. Linux Dependencies ---
    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc g++ gfortran ninja-build

    # --- 2. macOS Dependencies ---
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install gcc ninja

    # --- 3. Windows Dependencies (MSYS2 MinGW) ---
    - name: Setup MSYS2 (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-fortran
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    # --- 4. Build and Test ---
    - name: Configure CMake
      shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
      run: |
        cmake -B build -S . \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE

    - name: Build Stub
      shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
      run: cmake --build build

    - name: Run Tests
      working-directory: build
      shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}
      run: ctest --output-on-failure