name: C/Fortran Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Prevents cancelling other OS jobs if one fails
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. Linux Dependencies ---
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc g++ gfortran ninja-build

    # --- 2. macOS Dependencies ---
    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install gcc ninja

    # --- 3. Windows Dependencies (MSYS2 MinGW) ---
    - name: Setup MSYS2 (Windows)
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-fortran
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    # --- 4a. Build and Test (Unix: Linux / macOS) ---
    - name: Configure CMake (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          # Dynamically find Homebrew's gfortran (handles gfortran-13, gfortran-14, etc.)
          export FC=$(ls $(brew --prefix)/bin/gfortran* | sort -V | tail -n 1)
        else
          export FC=gfortran
        fi
        
        echo "Using Fortran compiler: $FC"
        
        cmake -B build -S . \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Stub (Unix)
      if: runner.os != 'Windows'
      run: cmake --build build

    - name: Run Tests (Unix)
      if: runner.os != 'Windows'
      working-directory: build
      run: ctest --output-on-failure

    # --- 4b. Build and Test (Windows MSYS2) ---
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        cmake -B build -S . \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE

    - name: Build Stub (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: cmake --build build

    - name: Run Tests (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      working-directory: build
      run: ctest --output-on-failure