name: Docker Build & FEniCSx Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build-verify:
    name: Build Docker Image and Test Import
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: dolfinx
        tags: dolfinx-serial:latest
        load: true # Required to load the image into the local runner so we can run it in the next step
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify DOLFINx Import
      run: |
        docker run --rm dolfinx-serial:latest python3 -c "import dolfinx; print(f'SUCCESS! DOLFINx imported cleanly. Version: {dolfinx.__version__}')"